events { 
    worker_connections 1024;
}

http {
    upstream all {
        # O Docker resolve automaticamente os nomes dos serviços para os seus IPs internos
        server app1:80;
        server app2:80;
    }

    server {
         listen 4500;
         location / {
              proxy_pass http://all/;
              proxy_set_header Host $host;
              proxy_set_header X-Real-IP $remote_addr;
         }
    }
}